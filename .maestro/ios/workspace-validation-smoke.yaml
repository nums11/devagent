appId: com.team7.devagent
---
- launchApp
- extendedWaitUntil:
    visible:
      id: new-chat-button
    timeout: 15000
- tapOn:
    id: new-chat-button
- extendedWaitUntil:
    visible:
      id: workspace-option-dev-agent-main
    timeout: 10000
- tapOn:
    id: workspace-option-dev-agent-main
- tapOn:
    id: start-new-chat-button
- extendedWaitUntil:
    visible:
      id: composer-input
    timeout: 10000
- assertVisible:
    id: active-workspace-label
