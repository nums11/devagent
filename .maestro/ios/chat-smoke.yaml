appId: com.team7.devagent
---
- launchApp
- extendedWaitUntil:
    visible:
      id: open-settings-button
    timeout: 10000
- tapOn:
    id: open-settings-button
- extendedWaitUntil:
    visible:
      id: theme-light-button
    timeout: 10000
- tapOn:
    id: theme-light-button
- tapOn:
    id: theme-dark-button
- tapOn:
    id: new-chat-button
- extendedWaitUntil:
    visible:
      id: start-new-chat-button
    timeout: 10000
- tapOn:
    id: start-new-chat-button
- tapOn:
    id: composer-input
- inputText: "List me all the folders in my home directory using the terminal."
- tapOn:
    id: send-button
- extendedWaitUntil:
    visible:
      id: thinking-indicator
    timeout: 10000
- extendedWaitUntil:
    visible:
      text: "Ran command"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: status-completed
    timeout: 30000
