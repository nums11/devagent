appId: com.team7.devagent
---
- launchApp
- extendedWaitUntil:
    visible:
      id: new-chat-button
    timeout: 10000
- tapOn:
    id: new-chat-button
- extendedWaitUntil:
    visible:
      id: start-new-chat-button
    timeout: 10000
- tapOn:
    id: start-new-chat-button
- tapOn:
    id: composer-input
- inputText: "Run sleep 10 and then reply ready"
- tapOn:
    id: send-button
- extendedWaitUntil:
    visible:
      id: stop-button
    timeout: 10000
- tapOn:
    id: composer-input
- inputText: "This should never send"
- tapOn:
    id: send-button
- extendedWaitUntil:
    visible:
      id: queued-next-turn-card
    timeout: 10000
- tapOn:
    id: stop-button
- extendedWaitUntil:
    notVisible:
      id: queued-next-turn-card
    timeout: 10000
- extendedWaitUntil:
    notVisible:
      id: message-user-2
    timeout: 10000
